name: web-research-agent-node
display_name: Web Research Agent (Node.js)
version: 0.1.0
description: >
  Research agent that searches the web for real-time information and synthesizes
  concise, sourced briefings. Uses Anthropic tool use to break down complex
  questions, search multiple angles, and deliver thorough answers with citations.
  Node.js port — faster sandbox setup via npm install.

category: research
tags:
  - research
  - search
  - web
  - briefing

author:
  name: Andy Browning
  github: andybrowning5

runtime:
  language: node
  run_command: node src/agent.js
  setup_command: npm install
  dependencies: package.json
  default_model:
    provider: anthropic
    model: claude-haiku-4-5-20251001
  resources:
    max_memory: 2GB
    max_cpu: 2

keys:
  - provider: anthropic
    env_var: ANTHROPIC_API_KEY
    domain: api.anthropic.com
    auth_style: x-api-key
    required: true
  - provider: brave
    env_var: BRAVE_API_KEY
    domain: api.search.brave.com
    auth_style: x-subscription-token
    required: true

permissions:
  network:
    - domain: api.anthropic.com
      reason: LLM inference for synthesizing research
    - domain: api.search.brave.com
      reason: Web search for real-time information
  filesystem:
    workspace: readwrite
  delegation:
    enabled: false
