name: web-research-agent-node
display_name: Web Research Agent (Node.js)
version: 0.1.0
description: >
  Searches the web and synthesizes sourced briefings with inline citations.
  Breaks complex questions into sub-queries for broader coverage.
  Persistent memory across sessions.

category: research
tags:
  - research
  - search
  - web
  - briefing

author:
  name: Andy Browning
  github: andybrowning5

runtime:
  language: node
  run_command: node bundle.mjs 2>/dev/null || node src/agent.js
  setup_command: test -f bundle.mjs || npm install
  dependencies: package.json
  default_model:
    provider: anthropic
    model: claude-haiku-4-5-20251001
  resources:
    max_memory: 2GB
    max_cpu: 2
    max_time: "30m"

keys:
  - provider: anthropic
    env_var: ANTHROPIC_API_KEY
    required: true
  - provider: brave
    env_var: BRAVE_API_KEY
    required: true

permissions:
  network:
    - domain: api.anthropic.com
      reason: LLM inference for synthesizing research
    - domain: api.search.brave.com
      reason: Web search for real-time information
  filesystem:
    workspace: readwrite
  delegation:
    enabled: false
